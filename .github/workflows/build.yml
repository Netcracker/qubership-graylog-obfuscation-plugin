name: Build

on:
  pull_request:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GRAYLOG_VERSION: "5.2.12"

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 17
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Run backend tests
        run: make backend-test

  package:
    name: Frontend, Package, Smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 17
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Install Yarn
        run: npm install --global yarn@1.22.22

      - name: Run frontend tests
        run: make frontend-test

      - name: Build plugin package
        run: make package

      - name: Run Graylog smoke test
        run: SMOKE_BUILD_TARGET=backend-package scripts/graylog-smoke-test.sh

      - name: Upload plugin JAR
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: graylog-obfuscation-plugin
          path: target/graylog-obfuscation-plugin-*.jar
          if-no-files-found: error

  release:
    name: Publish Release Artifact
    runs-on: ubuntu-latest
    needs:
      - package
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download plugin JAR
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: graylog-obfuscation-plugin
          path: dist

      - name: Publish GitHub release artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" dist/*.jar --clobber
          else
            gh release create "${tag}" dist/*.jar --title "${tag}" \
              --notes "Graylog obfuscation plugin ${tag}."
          fi
