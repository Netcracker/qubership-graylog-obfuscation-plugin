services:
  mongodb:
    image: mongo:7.0
    networks:
      - graylog

  opensearch:
    image: opensearchproject/opensearch:2.15.0
    environment:
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: GraylogSmokeTestAdminPassword1!
      discovery.type: single-node
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
    networks:
      - graylog

  graylog:
    image: graylog/graylog:${GRAYLOG_VERSION:-5.2.12}
    depends_on:
      - mongodb
      - opensearch
    environment:
      GRAYLOG_PASSWORD_SECRET: integration-test-password-secret-with-at-least-sixty-four-characters
      GRAYLOG_ROOT_PASSWORD_SHA2: ${GRAYLOG_ROOT_PASSWORD_SHA2:?Set GRAYLOG_ROOT_PASSWORD_SHA2 to the SHA-256 password hash}
      GRAYLOG_HTTP_BIND_ADDRESS: 0.0.0.0:9000
      GRAYLOG_HTTP_EXTERNAL_URI: http://127.0.0.1:${GRAYLOG_HTTP_PORT:-19000}/
      GRAYLOG_MONGODB_URI: mongodb://mongodb:27017/graylog
      GRAYLOG_ELASTICSEARCH_HOSTS: http://opensearch:9200
    ports:
      - "127.0.0.1:${GRAYLOG_HTTP_PORT:-19000}:9000"
    volumes:
      - "${PLUGIN_JAR:?Set PLUGIN_JAR to the built plugin JAR}:/usr/share/graylog/plugin/graylog-obfuscation-plugin.jar:ro"
    networks:
      - graylog

networks:
  graylog:
    driver: bridge
